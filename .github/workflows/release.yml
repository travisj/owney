name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mailserverd-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mailserverd-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mailserverd-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --bin mailserverd --target ${{ matrix.target }}
      - name: Hash & sign
        run: |
          BINARY="target/${{ matrix.target }}/release/mailserverd"
          HASH=$(blake3 "$BINARY" | cut -d' ' -f1)
          echo "$HASH" > ${{ matrix.artifact }}.blake3
          cp "$BINARY" ${{ matrix.artifact }}
      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.blake3
