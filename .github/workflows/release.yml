name: Release

# Every merge to main builds all platforms and updates the rolling "latest"
# release (which scripts/install via the marketing site pulls from).
# Pushing a v* tag builds the same artifacts into a versioned release.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: owneyd-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: owneyd-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: owneyd-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: owneyd-macos-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build web UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          # musl-tools ships `musl-gcc` (not the target-prefixed name the cc
          # crate probes for), so point cc + the linker at it explicitly.
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --bin owneyd --target ${{ matrix.target }}

      - name: Package tarball (binary + web UI)
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/owneyd dist/${{ matrix.artifact }}/
          cp -R crates/owney-api/static dist/${{ matrix.artifact }}/static
          cp LICENSE README.md dist/${{ matrix.artifact }}/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
          cat ${{ matrix.artifact }}.tar.gz.sha256

      - name: Smoke-test binary
        # Cross-compiled x86_64 macOS binaries run on arm64 hosts via Rosetta.
        run: |
          tar -xzf ${{ matrix.artifact }}.tar.gz -C /tmp
          /tmp/${{ matrix.artifact }}/owneyd --version

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Update rolling "latest" release (main)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f latest
          git push -f origin latest
          gh release create latest \
            --title "Latest build (main)" \
            --notes "Continuous build from main. Updated on every merge; install via https://travisj.github.io/owney/" \
            --prerelease \
            || true
          gh release upload latest dist/* --clobber

      - name: Create versioned release (v* tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            || true
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
