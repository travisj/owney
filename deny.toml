[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CC0-1.0",
  "Unicode-3.0",
  "MPL-2.0",
  # our own code
  "AGPL-3.0",
  # sequoia-openpgp (M4)
  "LGPL-2.0",
]

[bans]
multiple-versions = "warn"
# the deployment story is a single static binary; never link system OpenSSL
deny = [{ name = "openssl-sys" }, { name = "native-tls" }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
